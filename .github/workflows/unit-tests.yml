name: Unit Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check out deckr dependency
        run: git clone --depth=1 https://github.com/kws/deckr.git ../deckr

      - name: Check out deckr-controller dependency
        run: git clone --depth=1 https://github.com/kws/deckr-controller.git ../deckr-controller

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y libhidapi-dev libusb-1.0-0-dev

      - name: Build sibling dependency wheels
        run: |
          (cd ../deckr && uv build --wheel)
          (cd ../deckr-controller && uv build --wheel)

      - name: Install dependencies
        run: uv sync --dev --find-links ../deckr/dist --find-links ../deckr-controller/dist

      - name: Run unit tests with coverage
        run: uv run pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage.xml
          path: coverage.xml
